name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags: '*'

jobs:
  # Test using system MPI + HDF5.
  # Adapted from https://github.com/JuliaParallel/MPI.jl/blob/0a051294fcc45a329b5f445611791e4bbc6e0f23/.github/workflows/UnitTests.yml#L252
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        experimental: [false]
        version:
          - '1.10'
          - '1.12'
        os:
          - ubuntu-latest
        arch:
          - x64
        include:
          - version: 'pre'
            os: ubuntu-latest
            arch: x64
            experimental: true

    env:
      # JULIA_MPI_TEST_BINARY: system
      OMPI_MCA_btl_base_warn_component_unused: 0
      OMPI_MCA_rmaps_base_oversubscribe: true
      JULIA_DISABLE_PHDF5_TESTS: true  # parallel HDF5 tests currently fail on CI (they work locally...)

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MPI via apt
        run: |
          sudo apt-get update
          sudo apt-get install libopenmpi-dev libhdf5-openmpi-dev

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v3
        with:
          cache-registries: "true"

      - name: Add MPIPreferences + HDF5
        shell: julia --color=yes --project=test {0}
        run: |
          using Pkg
          Pkg.add("MPIPreferences")
          Pkg.add("HDF5")

      - name: Use system MPI + HDF5
        shell: julia --color=yes --project=test {0}
        run: |
          using MPIPreferences, HDF5
          MPIPreferences.use_system_binary()
          HDF5.API.set_libraries!("/usr/lib/x86_64-linux-gnu/hdf5/openmpi/libhdf5.so", "/usr/lib/x86_64-linux-gnu/hdf5/openmpi/libhdf5_hl.so")

      # This is to fix issue when loading system HDF5. We need to use the system libcurl instead of Julia's.
      # Note: LD_PRELOAD needs to be set here *and not before*, otherwise precompilation fails.
      # Update: this is no longer needed with Julia 1.12, but still needed for 1.10.
      - name: Update LD_PRELOAD for system HDF5
        if: ${{ matrix.version == '1.10' }}  # only run this step if using Julia 1.10
        # https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions#setting-an-environment-variable
        run: echo "LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libcurl.so.4" >> "$GITHUB_ENV"

      - name: Dump test/LocalPreferences.toml
        run: cat test/LocalPreferences.toml

      - uses: julia-actions/julia-runtest@v1

      - uses: julia-actions/julia-processcoverage@v1

      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MPI via apt
        run: |
          sudo apt-get update
          sudo apt-get install libopenmpi-dev

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'

      - uses: julia-actions/cache@v3
        with:
          cache-registries: "true"

      - name: Add MPIPreferences
        shell: julia --color=yes --project=. {0}
        run: |
          using Pkg
          Pkg.add("MPIPreferences")

      - name: Use system MPI
        shell: julia --color=yes --project=. {0}
        run: |
          using MPIPreferences
          MPIPreferences.use_system_binary()

      - name: Install docs dependencies
        shell: julia --color=yes --project=docs {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()

      - name: Build and deploy
        run: julia --project=docs docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}

